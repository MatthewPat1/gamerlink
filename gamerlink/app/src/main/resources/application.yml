server:
  port: 8080

spring:
  mail:
    host: localhost
    port: 1025
    username:
    password:
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: public
        format_sql: true
    show-sql: true

  flyway:
    enabled: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: -1ms
        shutdown-timeout: 100ms
  cache:
    type: redis

# Identity Module Configs
identity:
  app:
    rate-limit:
      password-reset:
        start-per-hour: 3
        verify-per-hour: 10
        ip-per-hour: 10
    security:
      jwt:
        secret: ${JWT_SECRET}
        issuer: ${APP_NAME}
        access-ttl-minutes: ${JWT_ACCESS_TTL}
      refresh-cookie:
        name: ${REFRESH_COOKIE_NAME}
        secure: false
        same-site: LAX
        path: /api/v1/auth
        refresh-ttl-days: ${REFRESH_TOKEN_TTL}
      token:
        pepper: ${TOKEN_PEPPER}
    mail:
      from: "no-reply@gamerlink.local"
      reset:
        subject: "Your GamerLink password reset code"

media:
  storage:
    env: ${SPRING_PROFILES_ACTIVE:local}
    bucket: ${MEDIA_BUCKET:gamerlink-media}
    endpoint: ${STORAGE_ENDPOINT:http://localhost:9000}
    region: ${AWS_REGION:us-east-1}
    access-key: ${STORAGE_ACCESS_KEY:minioadmin}
    secret-key: ${STORAGE_SECRET_KEY:minioadmin}
    cdn-base-url: ${CDN_BASE_URL:http://localhost:9000/gamerlink-media}

  upload:
    presigned-url-expiry-seconds: ${PRESIGNED_URL_EXPIRY:900}

  external-links:
    allowed-domains: twitch.tv,clips.twitch.tv,youtube.com,youtu.be

  scheduler:
    orphan-cleanup-interval-ms: 1800000
    deletion-cron: "0 0 2 * * *"

  validation:
    types:
      avatar:
        max-size-bytes: 5242880
        allowed-mime-types:
          - image/jpeg
          - image/webp
          - image/png
      banner:
        max-size-bytes: 10485760
        allowed-mime-types:
          - image/jpeg
          - image/webp
          - image/png
      screenshot:
        max-size-bytes: 15728640
        allowed-mime-types:
          - image/jpeg
          - image/webp
          - image/png
      clip:
        max-size-bytes: 524288000
        allowed-mime-types:
          - video/mp4
          - video/webm


# Shared configs (used by shared module beans)
app:
  redis:
    enabled: true

rate-limit:
  fail-open: false
  global:
    default-max-attempts: 100
    default-window-seconds: 3600


